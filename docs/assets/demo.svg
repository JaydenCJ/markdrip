<svg xmlns="http://www.w3.org/2000/svg" width="760" height="440" viewBox="0 0 760 440" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <rect width="760" height="440" rx="10" fill="#0d1117"/>
  <rect width="760" height="34" rx="10" fill="#161b22"/>
  <circle cx="20" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="17" r="6" fill="#febc2e"/>
  <circle cx="60" cy="17" r="6" fill="#28c840"/>
  <text x="380" y="21" fill="#8b949e" text-anchor="middle">markdrip — markdown renders while the tokens arrive</text>

  <text x="24" y="62" fill="#7ee787">$ my-ai-cli "explain the fix" | markdrip</text>

  <text x="24" y="90" fill="#d2a8ff" font-weight="bold"># The race condition</text>
  <text x="24" y="114" fill="#c9d1d9">The queue drained <tspan font-weight="bold" fill="#f0f6fc">before</tspan> the worker registered, so the</text>
  <text x="24" y="134" fill="#c9d1d9">first job was lost. The fix takes the lock <tspan fill="#ffd866">`q.mu`</tspan> first:</text>

  <text x="24" y="162" fill="#484f58">│ </text><text x="40" y="162" fill="#8b949e" font-style="italic">go</text>
  <text x="24" y="182" fill="#484f58">│ </text><text x="40" y="182" fill="#c9d1d9">q.mu.Lock()</text>
  <text x="24" y="202" fill="#484f58">│ </text><text x="40" y="202" fill="#c9d1d9">defer q.mu.Unlock()</text>
  <text x="24" y="222" fill="#484f58">│ </text><text x="40" y="222" fill="#c9d1d9">q.register(worker)   <tspan fill="#484f58">// ← streamed line-by-line</tspan></text>

  <text x="24" y="252" fill="#79c0ff">✔ </text><text x="44" y="252" fill="#c9d1d9">committed lines above never repaint</text>
  <text x="24" y="272" fill="#c9d1d9">The open tail repairs mid-stream: an unclosed <tspan font-weight="bold" fill="#f0f6fc">bold renders b</tspan><tspan fill="#f0f6fc">▎</tspan></text>

  <line x1="24" y1="292" x2="736" y2="292" stroke="#21262d"/>

  <text x="24" y="318" fill="#8b949e">stable committed region   ── never rewritten, safe to scroll / tee</text>
  <text x="24" y="338" fill="#8b949e">volatile tail (one block) ── repaired + repainted on every token</text>

  <text x="24" y="372" fill="#7ee787">$ printf '**bold `code' | markdrip --live --color</text>
  <text x="24" y="396" fill="#c9d1d9"><tspan font-weight="bold" fill="#f0f6fc">bold </tspan><tspan font-weight="bold" fill="#ffd866">code</tspan><tspan fill="#484f58">   ← the live frame while open; EOF finalizes danglers literally</tspan></text>
  <text x="24" y="420" fill="#8b949e">glow/glamour need the finished file; markdrip needs the next token.</text>
</svg>
